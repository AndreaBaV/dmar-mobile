name: Build iOS OTA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Instalar certificado y provisioning profile
        run: |
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          security import ios/certs/distribution.p12 -k build.keychain -P "Pronto40" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="dmar-mobile-adhoc"

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Generar manifest y página OTA
        run: |
          IPA_FILE=$(find build/ipa -name "*.ipa" | head -1)
          APP_NAME=$(basename "$IPA_FILE" .ipa)

          cat > manifest.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>https://github.com/${{ github.repository }}/releases/download/${{ github.sha }}/${APP_NAME}.ipa</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>com.dmar.asistente</string>
                  <key>bundle-version</key>
                  <string>1.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>D'Mar POS</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          cat > index.html << EOF
          <html>
          <body style="font-family:sans-serif;text-align:center;padding:40px">
            <h2>D'Mar POS</h2>
            <p>Versión: ${{ github.sha }}</p>
            <a href="itms-services://?action=download-manifest&url=https://github.com/${{ github.repository }}/releases/download/${{ github.sha }}/manifest.plist"
               style="background:#007AFF;color:white;padding:15px 30px;border-radius:10px;text-decoration:none;font-size:18px">
              Instalar en iPhone
            </a>
          </body>
          </html>
          EOF

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: "Build ${{ github.sha }}"
          files: |
            build/ipa/*.ipa
            manifest.plist
            index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}